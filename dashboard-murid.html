<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard Murid - LMS Tembok Belajar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .navbar {
            background: #1a73e8;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .logout-btn {
            float: right;
            background: white;
            color: #1a73e8;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
        .content {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <span>📚 LMS Tembok Belajar - Dashboard Murid</span>
        <a href="logout.html" class="logout-btn">Logout</a>
    </div>
    <div class="content">
        <h2>Selamat Datang, <span id="namaUser"></span>!</h2>
        <p>Ini adalah halaman khusus untuk murid.</p>
        <ul>
            <li><a href="materi.html">Lihat Materi</a></li>
            <li><a href="tugas.html">Lihat Tugas</a></li>
            <li><a href="nilai.html">Lihat Nilai</a></li>
        </ul>
    </div>
    
    <script>
        // Cek login
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        // Cek status (harus murid)
        if (localStorage.getItem('status') !== 'murid') {
            window.location.href = 'dashboard-guru.html';
        }
        
        // Tampilkan nama
        document.getElementById('namaUser').innerText = localStorage.getItem('nama') || 'Murid';
    </script>
</body>
</html>

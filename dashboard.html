<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard - LMS</title>
    <script>
        // Cek status user dari localStorage
        const status = localStorage.getItem('status');
        
        if (status === 'guru') {
            window.location.href = '/dashboard-guru.html';
        } else if (status === 'murid') {
            window.location.href = '/dashboard-murid.html';
        } else {
            // Jika belum login atau status tidak dikenal
            window.location.href = '/login.html';
        }
    </script>
</head>
<body>
    <p>Mengalihkan ke dashboard yang sesuai...</p>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LMS Tembok Belajar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        
        .loading {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .info {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>📚 LMS Tembok Belajar</h1>
        <div class="subtitle">Silakan login untuk melanjutkan</div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            
            <button type="submit" id="loginBtn">Login</button>
        </form>
        
        <div id="message" class="message"></div>
        <div class="info">
            🔐 Gunakan data yang sudah didaftarkan di spreadsheet
        </div>
    </div>

    <script>
        // 🔴 GANTI URL INI dengan Web App URL dari Google Apps Script Anda!
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkl83HoT--CnS-EptEsrfqgxPEO8SiOj-34_RM9ZlkyV1m1HH_ifBF47rOKPaAI33x/exec';
        
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                showMessage('Username dan password harus diisi', 'error');
                return;
            }
            
            // Tampilkan loading
            loginBtn.disabled = true;
            loginBtn.textContent = 'Memproses...';
            showMessage('Sedang memeriksa data...', 'loading');
            
            try {
                // Kirim data ke Google Apps Script menggunakan fetch dengan mode cors
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',  // Ubah dari 'no-cors' ke 'cors'
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                // Baca response dari server
                const data = await response.json();
                
                if (data.success) {
                    // Simpan data user ke localStorage
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('status', data.user.status);
                    localStorage.setItem('nama', data.user.nama);
                    
                    showMessage('Login berhasil! Mengalihkan...', 'success');
                    
                    // Redirect sesuai status
                    setTimeout(() => {
                        if (data.user.status === 'guru') {
                            window.location.href = '/dashboard-guru.html';
                        } else {
                            window.location.href = '/dashboard-murid.html';
                        }
                    }, 1000);
                } else {
                    showMessage(data.message || 'Login gagal. Periksa username dan password.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
                
            } catch (error) {
                console.error('Error detail:', error);
                
                // Jika fetch gagal karena CORS, coba pakai teknik JSONP
                if (error.message.includes('fetch')) {
                    showMessage('Mencoba metode alternatif...', 'loading');
                    tryLoginWithJsonp(username, password);
                } else {
                    showMessage('Terjadi kesalahan: ' + error.message, 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            }
        });
        
        // Metode alternatif menggunakan JSONP (callback)
        function tryLoginWithJsonp(username, password) {
            // Buat script tag untuk JSONP
            const callbackName = 'callback_' + Date.now();
            const script = document.createElement('script');
            
            // URL dengan parameter callback
            const url = APPS_SCRIPT_URL + '?callback=' + callbackName + 
                       '&username=' + encodeURIComponent(username) + 
                       '&password=' + encodeURIComponent(password);
            
            // Definisikan fungsi callback global
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                
                if (data.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('status', data.user.status);
                    localStorage.setItem('nama', data.user.nama);
                    
                    showMessage('Login berhasil! Mengalihkan...', 'success');
                    
                    setTimeout(() => {
                        if (data.user.status === 'guru') {
                            window.location.href = '/dashboard-guru.html';
                        } else {
                            window.location.href = '/dashboard-murid.html';
                        }
                    }, 1000);
                } else {
                    showMessage(data.message || 'Login gagal', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            };
            
            script.src = url;
            script.onerror = function() {
                showMessage('Gagal terhubung ke server. Coba lagi nanti.', 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
                delete window[callbackName];
            };
            
            document.body.appendChild(script);
        }
        
        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            if (type !== 'loading') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>

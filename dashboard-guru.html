<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard Guru - LMS Tembok Belajar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .navbar {
            background: #e8710a;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .logout-btn {
            float: right;
            background: white;
            color: #e8710a;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
        .content {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <span>📚 LMS Tembok Belajar - Dashboard Guru</span>
        <a href="logout.html" class="logout-btn">Logout</a>
    </div>
    <div class="content">
        <h2>Selamat Datang, <span id="namaUser"></span>!</h2>
        <p>Ini adalah halaman khusus untuk guru. Anda memiliki akses admin.</p>
        <ul>
            <li><a href="kelola-materi.html">Kelola Materi</a></li>
            <li><a href="kelola-tugas.html">Kelola Tugas</a></li>
            <li><a href="kelola-nilai.html">Kelola Nilai</a></li>
            <li><a href="lihat-murid.html">Lihat Daftar Murid</a></li>
        </ul>
    </div>
    
    <script>
        // Cek login
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }
        
        // Cek status (harus guru)
        if (localStorage.getItem('status') !== 'guru') {
            window.location.href = 'dashboard-murid.html';
        }
        
        // Tampilkan nama
        document.getElementById('namaUser').innerText = localStorage.getItem('nama') || 'Guru';
    </script>
</body>
</html>
